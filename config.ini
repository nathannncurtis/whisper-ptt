; WhisperPTT configuration — read by both the AHK front-end and the Python backend.

[hotkey]
; AutoHotkey v2 key name for hold-to-talk (RCtrl, F13, CapsLock, RAlt, ...)
key = RCtrl

[model]
; HuggingFace model id. .en variants = English-only, more accurate per size.
; Ladder: base (fastest) -> small.en (current) -> medium.en / distil-large-v3
; (best, heavier). Swap + run: .venv\Scripts\python -m whisper_ptt --fetch-model
id = openai/whisper-small.en
; Directory holding OpenVINO IR models, relative to this file
dir = models

[devices]
; Preference order; first device that loads AND passes a warmup inference wins.
; GPU stays last on purpose — it is driving three displays.
order = NPU, CPU, GPU

[cleanup]
; Optional LLM cleanup pass over the raw transcription (punctuation, casing,
; filler-word removal). OFF by default: current-gen Intel NPUs aren't quite
; worth their salt for LLM inference yet — Whisper's own punctuation plus the
; regex filler-strip covers dictation fine. All the plumbing (streaming typed
; output, guards, model fetch) stays; flip to true to bring it back.
enabled = false
; Must be an OpenVINO IR repo/dir. For NPU the weights must be INT4 symmetric
; CHANNEL-WISE quantized (the OpenVINO org's *-int4-cw-ov repos are; a plain
; int4/int8 export will not load on NPU).
; Qwen2.5-1.5B: exported locally (optimum-cli, int4 --sym --ratio 1.0
; --group-size -1). Previous: OpenVINO/Phi-3.5-mini-instruct-int4-cw-ov
; (still on disk — swap back by changing this line).
id = Qwen/Qwen2.5-1.5B-Instruct
; Device order for the cleanup model only (Whisper has its own in [devices]).
order = NPU, CPU
; Hard cap on generated tokens per utterance (also scaled to input length).
max_new_tokens = 256
; Utterances shorter than this many words skip the LLM (instant instead;
; Whisper's own punctuation plus the regex filler-strip is fine for them).
min_words = 5

[media]
; Pause any playing media (Spotify, browser, ...) while recording and resume
; it afterwards. Only sessions that were playing get resumed.
pause_on_record = true

[audio]
; sounddevice input device index, or "default" for the system default microphone.
; List devices with: .venv\Scripts\python -m sounddevice
mic_index = default
sample_rate = 16000
; Ambient-noise gate (Whisper hallucinates phrases from noise-only audio).
; This is the minimum 95th-percentile 100ms-window RMS; the recording must
; also have 2x dynamics between its loud and quiet windows (speech does,
; steady room noise doesn't — gain-independent). Every utterance logs
; rms/peak/floor — tune from those numbers.
silence_rms = 0.003

[server]
host = 127.0.0.1
port = 8765

[backend]
; Command AHK uses to launch the backend. "auto" tries, in order:
;   1) backend\whisper-ptt-backend.exe   (installed/bundled layout)
;   2) .venv\Scripts\pythonw.exe -m whisper_ptt   (dev layout)
command = auto

[logging]
; DEBUG / INFO / WARNING
level = INFO
; Log directory, relative to this file
dir = logs
