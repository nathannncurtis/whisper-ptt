; WhisperPTT configuration — read by both the AHK front-end and the Python backend.

[hotkey]
; AutoHotkey v2 key name for hold-to-talk (RCtrl, F13, CapsLock, RAlt, ...)
key = RCtrl

[model]
; HuggingFace model id. Swap to openai/whisper-small or openai/whisper-medium later,
; then run: .venv\Scripts\python -m whisper_ptt --fetch-model
id = openai/whisper-base
; Directory holding OpenVINO IR models, relative to this file
dir = models

[devices]
; Preference order; first device that loads AND passes a warmup inference wins.
; GPU stays last on purpose — it is driving three displays.
order = NPU, CPU, GPU

[audio]
; sounddevice input device index, or "default" for the system default microphone.
; List devices with: .venv\Scripts\python -m sounddevice
mic_index = default
sample_rate = 16000

[server]
host = 127.0.0.1
port = 8765

[backend]
; Command AHK uses to launch the backend. "auto" tries, in order:
;   1) backend\whisper-ptt-backend.exe   (installed/bundled layout)
;   2) .venv\Scripts\pythonw.exe -m whisper_ptt   (dev layout)
command = auto

[logging]
; DEBUG / INFO / WARNING
level = INFO
; Log directory, relative to this file
dir = logs
